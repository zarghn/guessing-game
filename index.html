<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>guessing</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1>Guess my number<span>!</span></h1>
      <p class="between">(between <span> 1 </span> to <span> 20</span>)</p>
      <button class="btnn again">> again <  </button>
      <div class="number" style="width: 20rem">?</div>
    </header>
    <main>
      <section class="left">
        <input type="number" class="guess" />
        <button class="btn check">> CHECK <</button>
      </section>

      <section class="right">
        <p class="message">START GUESSING ...</p>
        <p class="score">💯 Score: <span>20</span></p>
        <p class="highscore">🥇 Highscore: <span class="high">0</span></p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
